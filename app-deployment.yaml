apiVersion: apps/v1
kind: Deployment
metadata:
  name: capsule-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capsule-app
  template:
    metadata:
      labels:
        app: capsule-app
    spec:
      containers:
      - name: capsule-app
        image: lijazs/retail-devops-project:v1.0.0
        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: capsule-config
---
apiVersion: v1
kind: Service
metadata:
  name: capsule-service
spec:
  selector:
    app: capsule-app
  ports:
  - port: 83
    targetPort: 3000
  type: LoadBalancer